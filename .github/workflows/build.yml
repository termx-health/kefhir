name: Build & Publish

on:
  push:
    branches: [ master, 'R*' ]
    tags: [ 'R*' ]
  pull_request:
    branches: [ master, 'R*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build
        run: ./gradlew clean assemble

      - name: Test
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/test/TEST-*.xml'
          retention-days: 7

  publish:
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/R') || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/R'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Publish snapshot
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: ./gradlew publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        run: ./gradlew publish -Pversion="${GITHUB_REF_NAME}"
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
